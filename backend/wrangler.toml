#:schema node_modules/wrangler/config-schema.json
name = "prepgenie"
main = "main.py"
compatibility_date = "2024-03-29"
compatibility_flags = ["python_workers"]

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "prepgenie-db"
database_id = "59b7df7d-c50c-44b6-9b8a-538bfeb0f97e"

# Environment Variables
[vars]
CORS_ORIGINS = "https://prepgenie.pages.dev,http://localhost:3000"
